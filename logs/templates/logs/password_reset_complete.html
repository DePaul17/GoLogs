<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe modifié — GoLogs</title>
    {% include "logs/_auth_styles.html" %}
</head>
<body class="auth-page">
    <div class="auth-split">
        <aside class="auth-brand">
            <div class="auth-brand-logo">
                <div class="auth-brand-logo-icon">
                    <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" fill="#1a3c2f" opacity="0.15"/></svg>
                </div>
                <span class="auth-brand-name">GoLogs</span>
            </div>
        </aside>

        <main class="auth-form-side">
            <div class="auth-card">
                <h2>Mot de passe modifié</h2>
                <div class="alert-success">Votre mot de passe a été mis à jour. Vous pouvez vous connecter.</div>
                <a href="{% url 'login' %}" class="btn-primary" style="text-align:center;display:block;text-decoration:none;">Se connecter</a>
            </div>
        </main>
    </div>
</body>
</html>
