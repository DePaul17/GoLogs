<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié — GoLogs</title>
    {% include "logs/_auth_styles.html" %}
</head>
<body class="auth-page">
    <div class="auth-split">
        <aside class="auth-brand">
            <div class="auth-brand-logo">
                <div class="auth-brand-logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="3" width="18" height="18" rx="3" fill="#1a3c2f" opacity="0.15"/>
                        <path d="M10 8h4M10 12h4M10 16h2" stroke="#1a3c2f" stroke-width="1.5" stroke-linecap="round"/>
                        <circle cx="16" cy="16" r="4" stroke="#66bb6a" stroke-width="1.5"/>
                        <path d="M18 18l2 2" stroke="#66bb6a" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <span class="auth-brand-name">GoLogs</span>
            </div>
            <div class="auth-headline">
                <h1>Réinitialisation<br><span class="accent">sécurisée</span></h1>
                <p>Recevez un lien par e-mail pour définir un nouveau mot de passe.</p>
            </div>
        </aside>

        <main class="auth-form-side">
            <div class="auth-card">
                <h2>Mot de passe oublié</h2>
                <p class="subtitle">Saisissez votre adresse e-mail. Si un compte existe, vous recevrez un lien de réinitialisation.</p>

                <form method="post" action="{% url 'password_reset' %}">
                    {% csrf_token %}
                    <div class="auth-field">
                        <label for="email">Adresse e-mail</label>
                        <div class="input-wrap">
                            <span class="input-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
                            </span>
                            <input type="email" id="email" name="email" required autofocus>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Envoyer le lien</button>
                </form>

                <a href="{% url 'login' %}" class="auth-back">← Retour à la connexion</a>
            </div>
        </main>
    </div>
</body>
</html>
